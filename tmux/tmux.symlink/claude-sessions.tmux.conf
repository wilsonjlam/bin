# =====================================
# === Claude Window Management      ===
# =====================================
# Source this from your tmux.conf:
#   source-file ~/utility/tmux/claude-sessions.tmux.conf
#
# Each Claude instance runs in a tmux window. The status script
# auto-renames windows with status prefixes:
#   ● task1   = actively working (green in window list)
#   ? task2   = waiting for your input (red)
#   ✓ task3   = finished (cyan)
#   ○ task4   = stopped/dead (grey)
#
# Hooks in ~/.claude/settings.json write per-pane state files
# to ~/.claude-sessions/<pane_id>.state for semantic detection.
# Hash-based pane content polling provides fallback detection.
#
# Keybindings (all under prefix = C-Space):
#   C-Space C-n   → New Claude window (popup prompts for name)
#   C-Space C-m   → Claude window menu (fzf picker with status)
#   C-Space M-[   → Previous Claude window
#   C-Space M-]   → Next Claude window

# Poll + update window names every 3 seconds
set -g status-interval 1

# Append a compact Claude summary to status-right (e.g. "│ 2? 1● 3✓")
set -g status-right-length 200
set -ga status-right ' #(~/.tmux/bin/claude-session-status)'

# Style Claude windows in the window list using automatic colors
# Windows named with ? prefix get red, ● get green, ✓ get cyan
# (tmux doesn't support per-window-name colors natively, but the
#  status-right summary gives the colored overview)

# --- Keybindings (all under prefix) ---

# prefix + C-n : Create new Claude window (prompts for name)
bind-key C-n display-popup -E \
    "read -p 'Claude task name: ' name && ~/.tmux/bin/claude-session-new \"\$name\""

# prefix + C-m : Open Claude window menu (fzf picker)
bind-key C-m display-popup -w 60% -h 40% -E "~/.tmux/bin/claude-session-menu"
