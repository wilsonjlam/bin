# Pane manipulation menu - sourced by keybindings
# Usage: bind-key X source-file ~/.tmux/pane-menu.tmux.conf
display-menu \
    -x '#{e|+:#{pane_left},#{e|/:#{pane_width},3}}' \
    -y '#{e|+:#{pane_top},#{pane_height}}' \
    -T "#[align=centre]Pane Actions" \
    "Break to window"       b "break-pane" \
    "Join to vertical"      j "choose-tree 'join-pane -h -t %%'" \
    "Join to horizontal"    S "choose-tree 'join-pane -v -t %%'" \
    "" \
    "Swap left"             H "run 'tmux swap-pane -t \"{left-of}\"'" \
    "Swap down"             J "run 'tmux swap-pane -t \"{down-of}\"'" \
    "Swap up"               K "run 'tmux swap-pane -t \"{up-of}\"'" \
    "Swap right"            L "run 'tmux swap-pane -t \"{right-of}\"'" \
    "" \
    "Horizontal split"      s "split-window -v -c '#{pane_current_path}'" \
    "Vertical split"        v "split-window -h -c '#{pane_current_path}'" \
    "" \
    "Toggle zoom"           f "resize-pane -Z" \
    "Rotate layout"         r "next-layout" \
    "Even horizontal"       H "select-layout even-vertical" \
    "Even vertical"         V "select-layout even-horizontal" \
    "" \
    "Mark pane"             m "select-pane -m" \
    "Swap with marked"      M "swap-pane" \
    "" \
    "Kill pane"             x "kill-pane"
